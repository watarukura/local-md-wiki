pre-commit:
  parallel: true
  jobs:
    - name: oxlint
      run: pnpm oxlint
      glob: "*.{js,ts,jsx,tsx}"
    - name: oxfmt
      run: pnpm fmt
      glob: "*.{js,ts,jsx,tsx}"
    - name: test
      run: pnpm test
      glob: "*.{js,ts,jsx,tsx}"
    - name: actionlint
      glob: ".github/workflows/*.yam?l"
      run: actionlint
    - name: gitleaks
      run: gitleaks detect -v
    - name: typos
      run: typos .
