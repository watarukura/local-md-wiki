<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local Markdown Wiki</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="stylesheet" href="/static/github-dark.min.css" />
    <link rel="icon" href="/static/favicon.ico" />
  </head>

  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1>Pages</h1>
          <button id="new-page-button" type="button">New</button>
        </div>
        <div class="search-box">
          <input id="search-input" type="text" placeholder="Search..." />
        </div>
        <ul id="search-results" class="search-results" hidden></ul>
        <ul id="page-list" class="page-list"></ul>
      </aside>

      <main class="main">
        <div class="toolbar">
          <button id="menu-button" type="button" class="menu-button" title="Toggle Sidebar">
            ☰
          </button>
          <input id="page-name" type="text" />
          <button id="edit-button" type="button">Edit</button>
          <button id="save-button" type="button" hidden>Save</button>
          <button id="cancel-button" type="button" hidden>Cancel</button>
          <button id="meta-button" type="button" class="menu-button" title="Toggle Meta Sidebar">
            ℹ️
          </button>
        </div>

        <div id="viewer" class="viewer"></div>
        <div id="editor" class="editor" hidden></div>
      </main>

      <aside class="meta">
        <section>
          <h2>Backlinks</h2>
          <ul id="backlinks"></ul>
        </section>
        <section>
          <h2>2-hop links</h2>
          <ul id="twohop"></ul>
        </section>
      </aside>
    </div>

    <script type="module" src="/static/app.js"></script>
  </body>
</html>
